name: Deploy to InfinityFree

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Upload files by FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare InfinityFree folder
        shell: bash
        run: |
          mkdir -p _deploy
          rsync -av ./ _deploy/ \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_deploy' \
            --exclude='README.md' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='.vscode' \
            --exclude='.idea' \
            --exclude='config/local.php' \
            --exclude='config.local.php' \
            --exclude='database.sql' \
            --exclude='*.log' \
            --exclude='*.tmp' \
            --exclude='*.bak' \
            --exclude='.ftp-deploy-sync-state*.json'

      - name: Deploy to InfinityFree
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./_deploy/
          server-dir: /htdocs/bingo/
          state-name: .ftp-deploy-sync-state-bingo.json
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/_deploy/**
            README.md
            **/README.md
            **/.env
            **/.env.*
            **/.vscode/**
            **/.idea/**
            **/config/local.php
            **/config.local.php
            **/*.log
            **/*.tmp
            **/*.bak
            **/database.sql
            .ftp-deploy-sync-state.json
            **/.ftp-deploy-sync-state.json
